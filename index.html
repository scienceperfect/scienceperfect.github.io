    <h3>📊 오늘의 학습</h3>

    <div>오늘 푼 문제:
        <span id="todaySolved">0</span>
    </div>

    <div>오늘 정답:
        <span id="todayCorrect">0</span>
    </div>

        <span id="todayAccuracy">0</span>%
    </div>
</div>

</div>

<nav>

showTab('formulas');
document

.classList.remove('hidden-formula');

setQuizMode('all');
">

showTab('concepts');
searchConcept();

</button>

<section id="wrong" class="hidden">
